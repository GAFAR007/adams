# WHAT: Deploy the Adams Flutter web frontend to Netlify from the monorepo.
# WHY: Production web releases should follow the same push-to-deploy pattern used on Focus Mission.
# HOW: Install Flutter, validate the app, build `frontend/build/web`, then publish that directory to Netlify.

name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate deploy configuration
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID must be set in GitHub secrets."
            exit 1
          fi

          if [ -z "$PROD_API_BASE_URL" ]; then
            echo "PROD_API_BASE_URL must be set in GitHub repository variables."
            exit 1
          fi

      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze app
        working-directory: frontend
        run: flutter analyze

      - name: Run widget tests
        working-directory: frontend
        run: flutter test

      - name: Build production web bundle
        working-directory: frontend
        env:
          PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
        run: flutter build web --release --dart-define=API_BASE_URL="$PROD_API_BASE_URL"

      - name: Install Netlify CLI
        run: npm install --global netlify-cli

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          netlify deploy
          --dir=frontend/build/web
          --prod
          --message "GitHub Actions deploy ${GITHUB_SHA}"
